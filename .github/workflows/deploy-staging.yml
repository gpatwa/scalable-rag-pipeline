# .github/workflows/deploy-staging.yml
# Auto-deploys to staging on every push to main (after CI passes).
name: Deploy Staging

on:
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  ENVIRONMENT: staging

# Only one staging deploy at a time
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Quick smoke test before deploying
  # ──────────────────────────────────────────────────
  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///test.db"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
          S3_BUCKET_NAME: "test-bucket"
          NEO4J_PASSWORD: "testpass"
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────
  # Job 2a: Deploy to AWS Staging
  # ──────────────────────────────────────────────────
  deploy-aws:
    name: AWS Staging
    runs-on: ubuntu-latest
    needs: test
    if: vars.CLOUD_PROVIDER == 'aws'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/rag-backend-api:$IMAGE_TAG \
            -f services/api/Dockerfile services/api
          docker push $ECR_REGISTRY/rag-backend-api:$IMAGE_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name rag-platform-staging --region us-east-1

      - name: Helm Deploy
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          helm upgrade --install api deploy/helm/api \
            -f deploy/helm/api/values-staging.yaml \
            --set image.repository=$ECR_REGISTRY/rag-backend-api \
            --set image.tag=$IMAGE_TAG \
            --namespace default \
            --wait --timeout 180s

      - name: Verify
        run: |
          kubectl rollout status deployment/api-deployment --timeout=120s
          kubectl get pods -l app=api

  # ──────────────────────────────────────────────────
  # Job 2b: Deploy to Azure Staging
  # ──────────────────────────────────────────────────
  deploy-azure:
    name: Azure Staging
    runs-on: ubuntu-latest
    needs: test
    if: vars.CLOUD_PROVIDER == 'azure'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build & Push to ACR
        env:
          ACR_REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker build -t $ACR_REGISTRY/rag-backend-api:$IMAGE_TAG \
            -f services/api/Dockerfile services/api
          docker push $ACR_REGISTRY/rag-backend-api:$IMAGE_TAG

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP_STAGING }} \
            --name ${{ secrets.AKS_CLUSTER_NAME_STAGING }} \
            --overwrite-existing

      - name: Helm Deploy
        env:
          ACR_REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
          IMAGE_TAG: staging-${{ github.sha }}
        run: |
          helm upgrade --install api deploy/helm/api \
            -f deploy/helm/api/values-azure.yaml \
            -f deploy/helm/api/values-staging.yaml \
            --set image.repository=$ACR_REGISTRY/rag-backend-api \
            --set image.tag=$IMAGE_TAG \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"="${{ secrets.API_IDENTITY_CLIENT_ID }}" \
            --namespace default \
            --wait --timeout 180s

      - name: Verify
        run: |
          kubectl rollout status deployment/api-deployment --timeout=120s
          kubectl get pods -l app=api

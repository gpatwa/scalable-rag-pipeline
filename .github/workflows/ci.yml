# .github/workflows/ci.yml
# Continuous Integration — Lint, Test, Build for every PR and push to main.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Lint + Unit Tests (cloud-agnostic)
  # ──────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: services/api/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint (ruff)
        run: ruff check app/ tests/ --output-format=github

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///test.db"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: "ci-test-secret-key-not-for-production"
          S3_BUCKET_NAME: "test-bucket"
          NEO4J_PASSWORD: "testpass"
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────
  # Job 2: Docker Build (verify Dockerfile compiles)
  # ──────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/api/Dockerfile
          push: false
          tags: rag-backend-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────
  # Job 3: Terraform Validate (both clouds)
  # ──────────────────────────────────────────────────
  terraform-validate:
    name: Terraform Validate (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, azure]
        include:
          - cloud: aws
            tf_dir: infra/terraform
          - cloud: azure
            tf_dir: infra/terraform/azure
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: ${{ matrix.tf_dir }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.tf_dir }}
        run: terraform validate

      - name: Terraform Format Check
        working-directory: ${{ matrix.tf_dir }}
        run: terraform fmt -check -recursive

# .github/workflows/deploy-prod.yml
# Production deploy — manual trigger with environment approval gate.
name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Cloud provider"
        required: true
        type: choice
        options:
          - aws
          - azure
      image_tag:
        description: "Image tag to promote (staging-<sha> from deploy-staging)"
        required: true
        type: string

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Deploy to AWS Production
  # ──────────────────────────────────────────────────
  deploy-aws:
    name: AWS Production
    runs-on: ubuntu-latest
    if: inputs.cloud == 'aws'
    environment: production  # Requires approval via GitHub Environment protection rules
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag for production
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          SOURCE_TAG: ${{ inputs.image_tag }}
          PROD_TAG: prod-${{ github.sha }}
        run: |
          docker pull $ECR_REGISTRY/rag-backend-api:$SOURCE_TAG
          docker tag $ECR_REGISTRY/rag-backend-api:$SOURCE_TAG \
            $ECR_REGISTRY/rag-backend-api:$PROD_TAG
          docker push $ECR_REGISTRY/rag-backend-api:$PROD_TAG

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name rag-platform-cluster --region us-east-1

      - name: Helm Deploy
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
          PROD_TAG: prod-${{ github.sha }}
        run: |
          helm upgrade --install api deploy/helm/api \
            -f deploy/helm/api/values-prod.yaml \
            --set image.repository=$ECR_REGISTRY/rag-backend-api \
            --set image.tag=$PROD_TAG \
            --namespace default \
            --wait --timeout 300s

      - name: Verify
        run: |
          kubectl rollout status deployment/api-deployment --timeout=180s
          kubectl get pods -l app=api

  # ──────────────────────────────────────────────────
  # Job 2: Deploy to Azure Production
  # ──────────────────────────────────────────────────
  deploy-azure:
    name: Azure Production
    runs-on: ubuntu-latest
    if: inputs.cloud == 'azure'
    environment: production  # Requires approval via GitHub Environment protection rules
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Retag for production
        env:
          ACR_REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
          SOURCE_TAG: ${{ inputs.image_tag }}
          PROD_TAG: prod-${{ github.sha }}
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          docker pull $ACR_REGISTRY/rag-backend-api:$SOURCE_TAG
          docker tag $ACR_REGISTRY/rag-backend-api:$SOURCE_TAG \
            $ACR_REGISTRY/rag-backend-api:$PROD_TAG
          docker push $ACR_REGISTRY/rag-backend-api:$PROD_TAG

      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Helm Deploy
        env:
          ACR_REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io
          PROD_TAG: prod-${{ github.sha }}
        run: |
          helm upgrade --install api deploy/helm/api \
            -f deploy/helm/api/values-azure.yaml \
            -f deploy/helm/api/values-prod.yaml \
            --set image.repository=$ACR_REGISTRY/rag-backend-api \
            --set image.tag=$PROD_TAG \
            --set serviceAccount.annotations."azure\.workload\.identity/client-id"="${{ secrets.API_IDENTITY_CLIENT_ID }}" \
            --namespace default \
            --wait --timeout 300s

      - name: Verify
        run: |
          kubectl rollout status deployment/api-deployment --timeout=180s
          kubectl get pods -l app=api

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Platform</title>
<script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
<script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1b26;
    --surface2: #24253a;
    --border: #2f3146;
    --text: #e1e2e8;
    --text-dim: #8b8fa3;
    --accent: #7c6ef0;
    --accent-dim: #5b4dc7;
    --green: #4ec99b;
    --amber: #e6a040;
    --red: #e55561;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 span { font-size: 22px; }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }
  .status-dot.green { background: var(--green); }
  .status-dot.red { background: var(--red); }
  .status-dot.amber { background: var(--amber); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Source Files Bar ────────────────────── */
  .source-file-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text);
    white-space: nowrap;
  }

  /* ── Chat Area ──────────────────────────── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #chat-area::-webkit-scrollbar { width: 6px; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg {
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user .msg-avatar { background: var(--accent-dim); }
  .msg.assistant .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }

  .msg-body { flex: 1; min-width: 0; }
  .msg-role {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .msg-content {
    font-size: 15px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .msg-content { color: var(--text); }
  .msg.assistant .msg-content { color: #c8cad4; }

  /* ── Pipeline steps ─────────────────────── */
  .pipeline-steps {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .step-chip {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .step-chip.done { background: rgba(78,201,155,0.12); color: var(--green); }
  .step-chip.active { background: rgba(230,160,64,0.12); color: var(--amber); }
  .step-chip.retry { background: rgba(229,85,97,0.12); color: var(--red); }
  .step-chip .checkmark { font-size: 12px; }

  /* ── Tool result card ────────────────────── */
  .tool-result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text-dim);
  }
  .tool-result-card .tool-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--amber);
    margin-bottom: 4px;
  }
  .tool-result-card pre {
    white-space: pre-wrap;
    word-break: break-word;
    margin: 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
  }

  /* ── Eval badge ──────────────────────────── */
  .eval-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    margin-top: 6px;
  }
  .eval-badge.good { background: rgba(78,201,155,0.12); color: var(--green); }
  .eval-badge.poor { background: rgba(229,85,97,0.12); color: var(--red); }

  /* ── Data Analytics ──────────────────────── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin: 8px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .data-table th {
    background: var(--surface2);
    color: var(--accent);
    text-align: left;
    padding: 8px 12px;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid var(--border);
  }
  .data-table td {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(124,110,240,0.04); }
  .data-table .null-val { color: var(--text-dim); font-style: italic; }
  .row-count {
    font-size: 11px;
    color: var(--text-dim);
    padding: 6px 12px;
    text-align: right;
  }
  .sql-collapsible {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .sql-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 12px;
    color: var(--text-dim);
    user-select: none;
  }
  .sql-header:hover { background: rgba(124,110,240,0.06); }
  .sql-code {
    display: none;
    padding: 10px 14px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--green);
    border-top: 1px solid var(--border);
    margin: 0;
  }
  .sql-collapsible.open .sql-code { display: block; }
  .query-time {
    background: rgba(78,201,155,0.12);
    color: var(--green);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
  }
  .chart-container {
    margin: 8px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    overflow: hidden;
  }

  /* ── Context images (multimodal) ─────────── */
  .context-images {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .context-img-card {
    position: relative;
    border-radius: 8px;
    border: 1px solid var(--border);
    overflow: hidden;
    background: var(--surface2);
    max-width: 260px;
  }
  .context-img-card img {
    display: block;
    max-width: 260px;
    max-height: 200px;
    object-fit: contain;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .context-img-card img:hover { opacity: 0.85; }
  .context-img-caption {
    font-size: 11px;
    color: var(--text-dim);
    padding: 4px 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Source badges ──────────────────────── */
  .source-badge {
    display: inline-block;
    font-size: 11px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    margin: 2px 2px 0 0;
    color: var(--accent);
  }

  /* ── Welcome ────────────────────────────── */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
    padding: 40px;
  }
  #welcome h2 { font-size: 22px; color: var(--text); font-weight: 600; }
  #welcome p { font-size: 14px; max-width: 440px; text-align: center; line-height: 1.6; }
  .suggestions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .suggestion-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .suggestion-btn:hover { border-color: var(--accent); background: var(--surface2); }

  /* ── Input Bar ──────────────────────────── */
  #input-bar {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .input-wrapper {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px 6px 6px 18px;
    align-items: flex-end;
    transition: border-color 0.15s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 140px;
    min-height: 24px;
    line-height: 24px;
    padding: 8px 0;
  }
  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .footer-text {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    max-width: 780px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── Question Discovery Panel ────────────── */
  #question-panel {
    display: none;
    position: absolute;
    bottom: 100%;
    left: 0;
    right: 0;
    max-height: 400px;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 8px;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
    z-index: 100;
  }
  #question-panel.open { display: block; }
  .qp-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
  }
  .qp-header h3 { font-size: 13px; font-weight: 600; color: var(--text); margin: 0; }
  .qp-close {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 6px;
  }
  .qp-close:hover { background: var(--surface2); color: var(--text); }
  .qp-search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    margin: 8px 16px;
    width: calc(100% - 32px);
  }
  .qp-search:focus { border-color: var(--accent); }
  .qp-search::placeholder { color: var(--text-dim); }
  .qp-category {
    padding: 8px 16px 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent);
  }
  .qp-item {
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.1s;
  }
  .qp-item:hover { background: var(--surface2); }
  .qp-item:last-child { border-radius: 0 0 14px 14px; }
  .qp-icon { font-size: 15px; flex-shrink: 0; }
  .qp-text { flex: 1; }
  .qp-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(124,110,240,0.1);
    color: var(--accent);
  }
  .qp-empty {
    padding: 20px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }
  .qp-tabs {
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
  }
  .qp-tab {
    padding: 4px 10px;
    font-size: 11px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.1s;
  }
  .qp-tab:hover { border-color: var(--accent); color: var(--text); }
  .qp-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
  #explore-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  #explore-btn:hover { border-color: var(--accent); color: var(--accent); }
  #explore-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .input-bar-inner { position: relative; max-width: 780px; margin: 0 auto; }

  /* ── Rich Answer Formatting ──────────────── */
  .msg-content h3 { font-size: 14px; font-weight: 600; margin: 12px 0 6px; color: var(--accent); }
  .msg-content p { margin: 6px 0; line-height: 1.65; }
  .msg-content strong { color: var(--text); font-weight: 600; }
  .msg-content ul, .msg-content ol { margin: 6px 0 6px 20px; }
  .msg-content li { margin: 4px 0; line-height: 1.55; }
  .msg-content code {
    background: var(--surface2); padding: 1px 5px; border-radius: 4px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
  }
  .metric-highlight {
    display: inline-block;
    background: rgba(124,110,240,0.1);
    border: 1px solid rgba(124,110,240,0.2);
    border-radius: 6px;
    padding: 1px 7px;
    font-weight: 600;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .answer-summary {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin: 8px 0;
    font-size: 13px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <h1><span>&#x1f9e0;</span> RAG Platform</h1>
  <div class="status-bar">
    <span id="api-status"><span class="status-dot red"></span> Connecting...</span>
    <span id="source-files" style="display: flex; gap: 6px; flex-wrap: wrap;"></span>
  </div>
</header>

<div id="chat-area">
  <div id="welcome">
    <h2>Enterprise RAG Assistant</h2>
    <p>Ask questions about your ingested documents. The agent plans, retrieves from vector + graph stores, and synthesizes an answer.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="askSuggestion(this)">What was the revenue trend by month?</button>
      <button class="suggestion-btn" onclick="askSuggestion(this)">Top 10 product categories by sales</button>
      <button class="suggestion-btn" onclick="askSuggestion(this)">Average review score by state</button>
      <button class="suggestion-btn" onclick="askSuggestion(this)">Who founded Acme Corp?</button>
    </div>
  </div>
</div>

<div id="input-bar">
  <div class="input-bar-inner">
    <div id="question-panel"></div>
    <div class="input-wrapper">
      <button id="explore-btn" onclick="toggleQuestionPanel()" title="Explore questions">&#x2753;</button>
      <textarea id="user-input" rows="1" placeholder="Ask a question or click ? to explore..." autofocus></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">&#x27A4;</button>
    </div>
  </div>
  <div class="footer-text">Planner &rarr; Retriever / Tools / Multi-Step &rarr; Responder &rarr; Evaluator &mdash; Streaming NDJSON</div>
</div>

<script>
const API_BASE = window.location.origin;
let token = null;
let sessionId = null;
let isStreaming = false;

// ── Auto-resize textarea ──────────────────────
const input = document.getElementById('user-input');
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 140) + 'px';
});
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Source Files ──────────────────────────────
async function loadSourceFiles() {
  try {
    const res = await fetch(`${API_BASE}/api/v1/documents/list`, {
      headers: token ? { 'Authorization': `Bearer ${token}` } : {}
    });
    const data = await res.json();
    const files = data.files || [];
    const container = document.getElementById('source-files');
    if (files.length > 0) {
      container.innerHTML = files.map(f =>
        `<span class="source-file-tag">\u{1F4C4} ${escapeHtml(f.filename)}</span>`
      ).join('');
    }
  } catch (e) { /* silent — header stays clean */ }
}

// ── Init: get token + check health ────────────
async function init() {
  const label = document.querySelector('#api-status');

  // 1. Get dev token first (critical path — don't block on health)
  try {
    const tokenRes = await fetch(`${API_BASE}/auth/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: 'ui-user', role: 'admin' })
    });
    const tokenData = await tokenRes.json();
    token = tokenData.access_token;
    label.innerHTML = `<span class="status-dot green"></span> Connected`;
  } catch (e) {
    label.innerHTML = `<span class="status-dot red"></span> Offline`;
    return;
  }

  // 2. Background health check (non-blocking, with timeout)
  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 5000);
    const healthRes = await fetch(`${API_BASE}/health/readiness`, { signal: controller.signal });
    const health = await healthRes.json();
    const allUp = health.redis === 'up' && health.graphdb === 'up';
    if (!allUp) {
      label.innerHTML = `<span class="status-dot amber"></span> Degraded`;
    }
  } catch (e) {
    // Readiness check timed out or failed — still functional for chat
    label.innerHTML = `<span class="status-dot amber"></span> Degraded`;
  }

  // 3. Load ingested source file names (non-blocking, needs token)
  if (token) loadSourceFiles();
}

// ── Send message ──────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text || isStreaming || !token) return;

  // Hide welcome
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  // Add user message
  appendMessage('user', text);
  input.value = '';
  input.style.height = 'auto';
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  // Create assistant placeholder
  const assistantEl = appendMessage('assistant', '', true);
  const stepsEl = assistantEl.querySelector('.pipeline-steps');
  const contentEl = assistantEl.querySelector('.msg-content');

  try {
    const res = await fetch(`${API_BASE}/api/v1/chat/stream`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ message: text, session_id: sessionId })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.trim()) continue;
        try {
          const event = JSON.parse(line);
          handleEvent(event, stepsEl, contentEl);
        } catch (e) { /* skip non-JSON lines */ }
      }
    }

    // Process remaining buffer
    if (buffer.trim()) {
      try { handleEvent(JSON.parse(buffer), stepsEl, contentEl); } catch(e) {}
    }
  } catch (e) {
    contentEl.textContent = `Error: ${e.message}`;
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

// ── Handle streaming events ───────────────────
function handleEvent(event, stepsEl, contentEl) {
  if (event.session_id && !sessionId) {
    sessionId = event.session_id;
  }

  if (event.type === 'status') {
    const name = event.node;
    if (name === '__end__') {
      stepsEl.querySelectorAll('.step-chip.active').forEach(el => {
        el.classList.remove('active');
        el.classList.add('done');
        el.querySelector('.checkmark').textContent = '\u2713';
      });
      return;
    }
    // Mark previous active as done
    stepsEl.querySelectorAll('.step-chip.active').forEach(el => {
      el.classList.remove('active');
      el.classList.add('done');
      el.querySelector('.checkmark').textContent = '\u2713';
    });
    // Add new step chip
    const chip = document.createElement('span');
    const isRetry = name === 'retry';
    chip.className = `step-chip ${isRetry ? 'retry' : 'done'}`;
    const icon = {
      planner: '\u{1F9E0}', retriever: '\u{1F50D}', responder: '\u{2728}',
      tool_node: '\u{1F527}', evaluator: '\u{1F50E}', retry: '\u{1F504}',
      step_advance: '\u{27A1}', data_analytics: '\u{1F4CA}',
      context_enricher: '\u{1F4DA}'
    }[name] || '\u2699';
    chip.innerHTML = `${icon} ${name} <span class="checkmark">${isRetry ? '!' : '\u2713'}</span>`;
    stepsEl.appendChild(chip);
    scrollToBottom();
  }

  if (event.type === 'tool_result') {
    const card = document.createElement('div');
    card.className = 'tool-result-card';
    card.innerHTML = `<div class="tool-label">\u{1F527} ${escapeHtml(event.tool_name || 'tool')}</div><pre>${escapeHtml(event.content || '')}</pre>`;
    contentEl.parentElement.insertBefore(card, contentEl);
    scrollToBottom();
  }

  if (event.type === 'evaluation') {
    const score = event.score || 0;
    if (score > 0) {
      const badge = document.createElement('div');
      badge.className = `eval-badge ${score >= 3 ? 'good' : 'poor'}`;
      badge.textContent = `Quality: ${score}/5 \u2014 ${event.reasoning || ''}`;
      contentEl.parentElement.appendChild(badge);
      scrollToBottom();
    }
  }

  if (event.type === 'step_progress') {
    const chip = document.createElement('span');
    chip.className = 'step-chip done';
    chip.innerHTML = `\u{27A1} step ${event.current_step + 1} <span class="checkmark">\u2713</span>`;
    stepsEl.appendChild(chip);
    scrollToBottom();
  }

  // ── Data Analytics events ─────────────────────
  if (event.type === 'sql_query') {
    const card = document.createElement('div');
    card.className = 'sql-collapsible';
    card.innerHTML = `
      <div class="sql-header" onclick="this.parentElement.classList.toggle('open')">
        <span>\u{1F50D} View SQL</span>
        <span class="query-time">${event.time_ms || 0}ms</span>
      </div>
      <pre class="sql-code">${escapeHtml(event.sql || '')}</pre>`;
    contentEl.parentElement.insertBefore(card, contentEl);
    scrollToBottom();
  }

  if (event.type === 'data_result') {
    // Render HTML table
    if (event.table_html) {
      const tableContainer = document.createElement('div');
      tableContainer.innerHTML = event.table_html;
      contentEl.parentElement.insertBefore(tableContainer, contentEl);
    }
    // Render Vega-Lite chart if spec provided
    if (event.chart_spec && typeof vegaEmbed !== 'undefined') {
      const chartDiv = document.createElement('div');
      chartDiv.className = 'chart-container';
      contentEl.parentElement.insertBefore(chartDiv, contentEl);
      try {
        vegaEmbed(chartDiv, event.chart_spec, {
          actions: false,
          theme: 'dark',
          config: {
            background: '#1a1b26',
            axis: { labelColor: '#8b8fa3', titleColor: '#e1e2e8', gridColor: '#2f3146' },
            legend: { labelColor: '#8b8fa3', titleColor: '#e1e2e8' },
            title: { color: '#e1e2e8' },
            mark: { color: '#7c6ef0' },
          }
        });
      } catch (e) { console.warn('Chart render error:', e); }
    }
    scrollToBottom();
  }

  if (event.type === 'data_error') {
    const card = document.createElement('div');
    card.className = 'tool-result-card';
    card.innerHTML = `<div class="tool-label">\u26A0 Query Error</div><pre>${escapeHtml(event.content || '')}</pre>`;
    contentEl.parentElement.insertBefore(card, contentEl);
    scrollToBottom();
  }

  if (event.type === 'context_images') {
    const container = document.createElement('div');
    container.className = 'context-images';
    (event.images || []).forEach(img => {
      const card = document.createElement('div');
      card.className = 'context-img-card';
      const imgEl = document.createElement('img');
      imgEl.src = img.url;
      imgEl.alt = img.caption || img.filename || 'Retrieved image';
      imgEl.title = img.filename || '';
      imgEl.onclick = () => window.open(img.url, '_blank');
      card.appendChild(imgEl);
      if (img.caption || img.filename) {
        const cap = document.createElement('div');
        cap.className = 'context-img-caption';
        cap.textContent = img.caption || img.filename;
        card.appendChild(cap);
      }
      container.appendChild(card);
    });
    contentEl.parentElement.insertBefore(container, contentEl);
    scrollToBottom();
  }

  if (event.type === 'answer') {
    // Extract [Source: ...] references
    const sourceRegex = /\[Source:\s*([^\]]+)\]/g;
    let match;
    const sources = [];
    while ((match = sourceRegex.exec(event.content)) !== null) {
      sources.push(match[1]);
    }
    const cleanText = event.content.replace(sourceRegex, '').trim();

    // Render markdown-like formatting
    contentEl.innerHTML = renderMarkdown(cleanText);

    // Add source badges
    if (sources.length > 0) {
      const badgeContainer = document.createElement('div');
      badgeContainer.style.marginTop = '8px';
      sources.forEach(s => {
        const badge = document.createElement('span');
        badge.className = 'source-badge';
        badge.textContent = '\u{1F4C4} ' + s.trim();
        badgeContainer.appendChild(badge);
      });
      contentEl.appendChild(badgeContainer);
    }
    scrollToBottom();
  }

  if (event.type === 'error') {
    contentEl.textContent = '\u274C ' + event.content;
    contentEl.style.color = '#e55561';
  }
}

// ── DOM helpers ───────────────────────────────
function appendMessage(role, text, withSteps = false) {
  const chat = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatarIcon = role === 'user' ? '\u{1F464}' : '\u{1F916}';
  let bodyHTML = `
    <div class="msg-avatar">${avatarIcon}</div>
    <div class="msg-body">
      <div class="msg-role">${role}</div>
      ${withSteps ? '<div class="pipeline-steps"></div>' : ''}
      <div class="msg-content">${escapeHtml(text)}</div>
    </div>`;
  div.innerHTML = bodyHTML;
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

function scrollToBottom() {
  const chat = document.getElementById('chat-area');
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ── Markdown-like renderer for answers ────────
function renderMarkdown(text) {
  let html = escapeHtml(text);

  // Bold: **text** → <strong>text</strong>
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Highlight currency/numbers: $1,234.56 or 1,234,567
  html = html.replace(/\$[\d,]+\.?\d*/g, '<span class="metric-highlight">$&</span>');
  html = html.replace(/\b(\d{1,3}(?:,\d{3})+(?:\.\d+)?)\b/g, (match) => {
    // Only highlight numbers with commas (large numbers)
    return `<span class="metric-highlight">${match}</span>`;
  });

  // Numbered lists: 1. item → <li>item</li>
  html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<li><strong>$1.</strong> $2</li>');

  // Bullet lists: - item → <li>item</li>
  html = html.replace(/^[-\u2022]\s+(.+)$/gm, '<li>$1</li>');

  // Wrap consecutive <li> in <ol> or <ul>
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul style="list-style:none;padding-left:8px">$1</ul>');

  // Headers: lines ending with colon that are short
  html = html.replace(/^(.{5,60}):$/gm, '<h3>$1</h3>');

  // Paragraphs: double newlines
  html = html.replace(/\n\n+/g, '</p><p>');
  // Single newlines within paragraphs
  html = html.replace(/\n/g, '<br>');

  // Wrap in paragraph
  html = '<p>' + html + '</p>';

  // Clean up empty paragraphs
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/<p>\s*<ul/g, '<ul');
  html = html.replace(/<\/ul>\s*<\/p>/g, '</ul>');

  return html;
}

function askSuggestion(btn) {
  input.value = btn.textContent;
  sendMessage();
}

let activeCategory = 'all';

function toggleQuestionPanel() {
  const panel = document.getElementById('question-panel');
  const btn = document.getElementById('explore-btn');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
  if (panel.classList.contains('open')) {
    renderQuestionPanel();
  }
}

function renderQuestionPanel(filter = '', category = 'all') {
  const panel = document.getElementById('question-panel');
  const filterLower = filter.toLowerCase();

  let html = `
    <div class="qp-header">
      <h3>\u{1F50D} Explore Questions</h3>
      <button class="qp-close" onclick="toggleQuestionPanel()">\u2715</button>
    </div>
    <input class="qp-search" type="text" placeholder="Filter questions..." value="${escapeHtml(filter)}" oninput="renderQuestionPanel(this.value, '${category}')" autofocus>
    <div class="qp-tabs">
      <button class="qp-tab ${category === 'all' ? 'active' : ''}" onclick="renderQuestionPanel('${escapeHtml(filter)}', 'all')">All</button>
      ${QUESTION_CATALOG.map(c => `<button class="qp-tab ${category === c.cat ? 'active' : ''}" onclick="renderQuestionPanel('${escapeHtml(filter)}', '${c.cat}')">${c.icon} ${c.cat}</button>`).join('')}
    </div>`;

  let hasResults = false;
  QUESTION_CATALOG.forEach(c => {
    if (category !== 'all' && category !== c.cat) return;
    const filtered = c.questions.filter(q => !filterLower || q.toLowerCase().includes(filterLower));
    if (filtered.length === 0) return;
    hasResults = true;
    html += `<div class="qp-category">${c.icon} ${c.cat}</div>`;
    filtered.forEach(q => {
      html += `<div class="qp-item" onclick="selectQuestion('${escapeHtml(q)}')">
        <span class="qp-text">${highlightMatch(q, filter)}</span>
        <span class="qp-tag">data</span>
      </div>`;
    });
  });

  if (!hasResults) {
    html += `<div class="qp-empty">No questions match "<strong>${escapeHtml(filter)}</strong>"<br>Try typing your own question!</div>`;
  }

  panel.innerHTML = html;
  if (filter) {
    const searchInput = panel.querySelector('.qp-search');
    if (searchInput) { searchInput.focus(); searchInput.setSelectionRange(filter.length, filter.length); }
  }
}

function highlightMatch(text, match) {
  if (!match) return escapeHtml(text);
  const idx = text.toLowerCase().indexOf(match.toLowerCase());
  if (idx === -1) return escapeHtml(text);
  return escapeHtml(text.substring(0, idx)) +
    '<strong style="color:var(--accent)">' + escapeHtml(text.substring(idx, idx + match.length)) + '</strong>' +
    escapeHtml(text.substring(idx + match.length));
}

function selectQuestion(q) {
  input.value = q;
  toggleQuestionPanel();
  sendMessage();
}

// Close panel when clicking outside
document.addEventListener('click', (e) => {
  const panel = document.getElementById('question-panel');
  const btn = document.getElementById('explore-btn');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== btn) {
    panel.classList.remove('open');
    btn.classList.remove('active');
  }
});

apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: gpu-nodeclass
spec:
  amiFamily: AL2
  role: "rag-platform-cluster-karpenter-node"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "rag-platform-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "rag-platform-cluster"
  # REQUIRED IN V1: Tells Karpenter to always use the latest AL2 image
  amiSelectorTerms:
    - alias: al2@latest

---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-pool
spec:
  limits:
    cpu: 32
    nvidia.com/gpu: 1
  disruption:
    consolidationPolicy: WhenUnderutilized
  template:
    spec:
      # MOVED IN V1: Expiration now lives here
      expireAfter: 720h 
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["g"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu-nodeclass
      
      # FIXED: Nodes receive taints, which repels non-GPU pods
      taints:
        - key: "nvidia.com/gpu"
          effect: "NoSchedule"
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: cpu-nodeclass
spec:
  amiFamily: AL2
  role: "rag-platform-cluster-karpenter-node"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "rag-platform-cluster"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "rag-platform-cluster"
  # REQUIRED IN V1
  amiSelectorTerms:
    - alias: al2@latest

---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cpu-pool
spec:
  limits:
    cpu: 16
  disruption:
    consolidationPolicy: WhenUnderutilized
  template:
    spec:
      # MOVED IN V1
      expireAfter: 720h
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: cpu-nodeclass
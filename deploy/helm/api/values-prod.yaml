# deploy/helm/api/values-prod.yaml
# Production environment overrides — HA, resource-optimized, minimal logging.
# Usage: helm upgrade --install api deploy/helm/api -f values-azure.yaml -f values-prod.yaml

replicaCount: 2

image:
  pullPolicy: IfNotPresent

env:
  ENV: "prod"
  LOG_LEVEL: "WARNING"
  # Embedding — production model (BGE-M3 via Ray Serve or OpenAI)
  EMBED_MODEL: "bge-m3"  # Or "text-embedding-3-small" if EMBED_PROVIDER=openai
  # Re-ranking — cross-encoder via Ray Serve for best accuracy (~50ms)
  RERANKER_PROVIDER: "cross_encoder"
  RERANKER_SCORE_THRESHOLD: "0.3"
  RERANKER_ENDPOINT: "http://reranker-service:8000/rerank"
  # Agentic pipeline — tool endpoints
  SANDBOX_URL: "http://sandbox-service:8080/execute"
  # TAVILY_API_KEY: loaded from app-env-secret

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# deploy/helm/api/values-staging.yaml
# Staging environment overrides — lightweight, debug-friendly.
# Usage: helm upgrade --install api deploy/helm/api -f values-azure.yaml -f values-staging.yaml

replicaCount: 1

image:
  pullPolicy: Always  # Always pull to get latest staging build

env:
  ENV: "staging"
  LOG_LEVEL: "DEBUG"
  # Embedding — dedicated model (not the generative LLM)
  EMBED_MODEL: "nomic-embed-text"
  # Re-ranking — LLM-based scoring for staging (no extra infra needed)
  RERANKER_PROVIDER: "llm"
  RERANKER_SCORE_THRESHOLD: "0.3"
  # Multimodal RAG (Gemini embeddings)
  MULTIMODAL_ENABLED: "true"
  GEMINI_EMBED_MODEL: "gemini-embedding-2-preview"
  GEMINI_EMBED_DIMENSIONS: "768"
  # GOOGLE_API_KEY: loaded from Key Vault via app-env-secret
  # Context Layer Architecture (enterprise knowledge enrichment)
  CONTEXT_LAYERS_ENABLED: "true"
  CONTEXT_LAYER1_ENABLED: "true"   # Document metadata & usage
  CONTEXT_LAYER2_ENABLED: "true"   # Annotations & glossary
  CONTEXT_LAYER3_ENABLED: "true"   # Code & pipeline context
  CONTEXT_LAYER4_ENABLED: "true"   # Business context
  CONTEXT_LAYERS_MAX_TOKENS: "1500"
  # Data Analytics Agent (text-to-SQL with tables + charts)
  DATA_ANALYTICS_ENABLED: "true"
  ANALYTICS_QUERY_TIMEOUT: "10"
  ANALYTICS_MAX_ROWS: "1000"
  # ANALYTICS_DB_URL: falls back to DATABASE_URL if not set (acceptable for staging)
  # Agentic pipeline — tool endpoints
  SANDBOX_URL: "http://sandbox-service:8080/execute"
  # TAVILY_API_KEY: loaded from Key Vault via app-env-secret

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

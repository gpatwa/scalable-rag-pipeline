# deploy/helm/api/values-staging.yaml
# Staging environment overrides — lightweight, debug-friendly.
# Usage: helm upgrade --install api deploy/helm/api -f values-azure.yaml -f values-staging.yaml

replicaCount: 1

image:
  pullPolicy: Always  # Always pull to get latest staging build

env:
  ENV: "staging"
  LOG_LEVEL: "DEBUG"
  # Embedding — dedicated model (not the generative LLM)
  EMBED_MODEL: "nomic-embed-text"
  # Re-ranking — LLM-based scoring for staging (no extra infra needed)
  RERANKER_PROVIDER: "llm"
  RERANKER_SCORE_THRESHOLD: "0.3"
  # Agentic pipeline — tool endpoints
  SANDBOX_URL: "http://sandbox-service:8080/execute"
  # TAVILY_API_KEY: loaded from app-env-secret

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# deploy/secrets/external-secrets-azure.yaml
# Azure Key Vault — External Secrets Operator manifests.
#
# Prerequisites:
#   1. Install External Secrets Operator:
#      helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
#   2. Create the ClusterSecretStore (below) — uses Workload Identity
#
#   3. Apply the ExternalSecret (below) — creates the K8s Secret from Key Vault
#
# Usage:
#   kubectl apply -f deploy/secrets/external-secrets-azure.yaml
---
# ClusterSecretStore — connects External Secrets Operator to Azure Key Vault
# via Workload Identity (no static credentials required)
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: azure-key-vault
spec:
  provider:
    azurekv:
      # Set to your Key Vault URL (from terraform output key_vault_url)
      vaultUrl: "https://rag-platform-aks-kv.vault.azure.net"
      authType: WorkloadIdentity
      serviceAccountRef:
        name: api-sa
        namespace: default

---
# ExternalSecret — syncs Key Vault secrets into a K8s Secret
# The K8s Secret is auto-refreshed every hour, enabling rotation
# without pod restarts.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets-azure
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: azure-key-vault
    kind: ClusterSecretStore

  target:
    name: app-env-secret
    creationPolicy: Owner

  data:
    # Database password (stored separately from connection URL)
    - secretKey: DB_PASSWORD
      remoteRef:
        key: db-password

    # JWT signing secret
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: jwt-secret-key

    # Neo4j graph database password
    - secretKey: NEO4J_PASSWORD
      remoteRef:
        key: neo4j-password

    # Redis primary access key
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: redis-primary-key

    # OpenAI API key (optional — will be empty if not stored in KV)
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: openai-api-key

    # Google Gemini API key (for multimodal embeddings)
    - secretKey: GOOGLE_API_KEY
      remoteRef:
        key: google-api-key

# deploy/ray/ray-cluster.yaml
# Dev/Learning config — downsized for cost. See comments for production values.
apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: rag-ray-cluster
  namespace: default
spec:
  # Ray Version: Must match your Python SDK version
  rayVersion: '2.9.0'

  ###################################
  # HEAD NODE (The Manager)
  # Orchestrates tasks but does no heavy lifting.
  ###################################
  headGroupSpec:
    serviceType: ClusterIP # Internal communication only
    rayStartParams:
      dashboard-host: '0.0.0.0' # Enable dashboard for monitoring
      num-cpus: '0' # Don't run tasks on head node

    template:
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.9.0-py310-gpu
          resources:
            # Dev: 1 CPU / 4Gi (prod: 2 CPU / 8Gi)
            limits:
              cpu: "1"
              memory: "4Gi"
            requests:
              cpu: "1"
              memory: "4Gi"
          ports:
          - containerPort: 6379 # Redis port (Ray uses Redis internally)
          - containerPort: 8265 # Dashboard port

  ###################################
  # WORKER GROUPS (The Muscle)
  ###################################
  workerGroupSpecs:

  # GROUP A: CPU Workers (For Ingestion: PDF Parsing, Text Splitting)
  # Dev: scales 0-3 with smaller instances (prod: 1-50 with c6i.2xlarge)
  - groupName: cpu-workers
    replicas: 0
    minReplicas: 0       # Scale to zero when idle (prod: 1)
    maxReplicas: 3       # Cap for dev budget (prod: 50)
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.9.0-py310 # CPU Image
          resources:
            # Dev: 2 CPU / 8Gi (prod: 8 CPU / 32Gi on c6i instances)
            limits:
              cpu: "2"
              memory: "8Gi"
            requests:
              cpu: "2"
              memory: "8Gi"
        # Node Selector: Tells Karpenter to use cost-effective CPU nodes
        nodeSelector:
          karpenter.k8s.aws/instance-family: "t3a"  # Dev: burstable (prod: c6i)

  # GROUP B: GPU Workers (For Embeddings, Graph Extraction, LLM Inference)
  # Scale-to-zero: Only runs when actively inferencing (~$0.60/hr on SPOT)
  - groupName: gpu-workers
    replicas: 0
    minReplicas: 0        # Scale to zero when idle (key cost saver!)
    maxReplicas: 2        # Cap for dev budget (prod: 20)
    rayStartParams: {}
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.9.0-py310-gpu
          resources:
            # Dev: 4 CPU / 16Gi (prod: 4 CPU / 32Gi)
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: 1 # Request 1 GPU per pod
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: 1
        # Node Selector: Tells Karpenter to use GPU nodes
        nodeSelector:
          karpenter.k8s.aws/instance-category: "g"
        # Tolerations: Allow scheduling on Tainted GPU nodes
        tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

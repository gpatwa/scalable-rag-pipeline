# deploy/ray/ray-serve-llm.yaml
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: llm-service
spec:
  serviceUnhealthySecondThreshold: 900
  deploymentUnhealthySecondThreshold: 900

  # 1. THE EMBEDDED CLUSTER CONFIG (Copied from ray-cluster.yaml)
  rayClusterConfig:
    rayVersion: '2.9.0'
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0'
      template:
        spec:
          # Head node doesn't need GPU — use multi-arch image (amd64 + arm64)
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
          - name: ray-head
            image: rayproject/ray:2.9.0-py310
            resources:
              limits:
                cpu: "2"
                memory: "8Gi"
              requests:
                cpu: "2"
                memory: "8Gi"
            ports:
            - containerPort: 6379
            - containerPort: 8265
    workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 0  # Scale-to-zero: Ray autoscaler provisions on demand
      minReplicas: 0
      maxReplicas: 1
      rayStartParams: {}
      template:
        spec:
          containers:
          - name: ray-worker
            image: rayproject/ray:2.9.0-py310-gpu
            resources:
              # Dev: sized for g5.xlarge (4 vCPU, 16GB RAM, 1x A10G 24GB VRAM)
              limits:
                cpu: "3"
                memory: "14Gi"
                nvidia.com/gpu: 1
              requests:
                cpu: "2"
                memory: "10Gi"
                nvidia.com/gpu: 1
          nodeSelector:
            karpenter.k8s.aws/instance-category: "g"
          tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"

  # 2. THE SERVE CONFIG (vLLM with 8B model for dev)
  serveConfigV2: |
    applications:
      - name: llama3
        import_path: services.api.app.models.vllm_engine:app
        route_prefix: /llm
        runtime_env:
          pip: ["vllm==0.3.0", "torch==2.1.2"]
          env_vars:
            MODEL_ID: "meta-llama/Meta-Llama-3-8B-Instruct"
        deployments:
          - name: VLLMDeployment
            autoscaling_config:
              min_replicas: 0
              max_replicas: 1
              target_num_ongoing_requests_per_replica: 20
            ray_actor_options:
              num_cpus: 2
              num_gpus: 1
            user_config:
              max_model_len: 4096
              max_num_seqs: 64
              quantization: "awq"

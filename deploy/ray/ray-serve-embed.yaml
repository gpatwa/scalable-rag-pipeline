# deploy/ray/ray-serve-embed.yaml
apiVersion: ray.io/v1
kind: RayService
metadata:
  name: embed-service
spec:
  serviceUnhealthySecondThreshold: 900
  deploymentUnhealthySecondThreshold: 900

  # 1. THE EMBEDDED CLUSTER CONFIG (Required by KubeRay v1.0.0)
  rayClusterConfig:
    rayVersion: '2.9.0'
    headGroupSpec:
      serviceType: ClusterIP
      rayStartParams:
        dashboard-host: '0.0.0.0'
        num-cpus: '0'
      template:
        spec:
          containers:
          - name: ray-head
            image: rayproject/ray:2.9.0-py310-gpu
            resources:
              limits:
                cpu: "2"
                memory: "8Gi"
              requests:
                cpu: "2"
                memory: "8Gi"
            ports:
            - containerPort: 6379
            - containerPort: 8265
    workerGroupSpecs:
    - groupName: gpu-workers
      replicas: 1 
      minReplicas: 0
      maxReplicas: 1
      rayStartParams: {}
      template:
        spec:
          containers:
          - name: ray-worker
            image: rayproject/ray:2.9.0-py310-gpu
            resources:
              limits:
                cpu: "4"
                memory: "32Gi"
                nvidia.com/gpu: 1
              requests:
                cpu: "4"
                memory: "32Gi"
                nvidia.com/gpu: 1
          nodeSelector:
            karpenter.k8s.aws/instance-category: "g"
          tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"

  # 2. THE SERVE CONFIG (The original Embedding logic)
  serveConfigV2: |
    applications:
      - name: bge-m3
        import_path: services.api.app.models.embedding_engine:app
        route_prefix: /embed
        deployments:
          - name: EmbedDeployment
            autoscaling_config:
              min_replicas: 0
              max_replicas: 1
              target_num_ongoing_requests_per_replica: 50
            ray_actor_options:
              num_cpus: 2
              num_gpus: 0.5

# docker-compose.yml
version: '3.8'

services:
  # 1. Postgres (Chat History)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ragadmin
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: rag_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  # 2. Redis (Cache)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 3. Qdrant (Vector DB)
  qdrant:
    image: qdrant/qdrant:v1.7.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # 4. Neo4j (Graph DB)
  neo4j:
    image: neo4j:5.16.0-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_pagecache_size: 1G
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data

  # 5. MinIO (S3 Mock) - Optional for full offline dev
  minio:
    image: minio/minio
    command: server /data
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    volumes:
      - .:/app
    environment:
      - PYTHONPATH=/app
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - QDRANT_HOST=qdrant
      - NEO4J_URI=bolt://neo4j:7687
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    networks:
      - rag-network
    profiles: ["tools"] # This prevents it from starting automatically with 'docker compose up'

volumes:
  pg_data:
  qdrant_data:
  neo4j_data: